# BD (Neon.tech)

spring.datasource.url=${DB_URL:jdbc:postgresql://ep-royal-smoke-ampjv0aq-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${DB_USERNAME:neondb_owner}
